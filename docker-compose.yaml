services:
  db:
    image: mariadb:10.5
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sql_injection_db
      MYSQL_USER: lab_user
      MYSQL_PASSWORD: lab_password
    volumes:
      - ./db/01_init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - lab-network

  app:
    build: ./app/vulnerabile
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge
